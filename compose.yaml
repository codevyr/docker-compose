services:
  askld:
    image: ghcr.io/codevyr/askld:v0.1.1
    command: ["--index", "/data/index.db", "--format", "sqlite", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - /home/codevyr/index/:/data/:rw
      - /home/codevyr/trace/:/trace/:rw
    environment:
      - RUST_LOG=info
  codevyr:
    #image: ghcr.io/codevyr/codevyr:main-0d22b13
    image: ghcr.io/codevyr/codevyr:v0.1.4
    environment:
      - API_HOST=http://askld:8080
    ports:
      - "3000:3000"
