services:
  askld:
    image: askld:latest
    build:
      context: ../askl
      dockerfile: docker/askld/Dockerfile
    command: ["--index", "/data/index.db", "--format", "sqlite", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - /home/codevyr/index/:/data/:rw
      - /home/codevyr/trace/:/trace/:rw
    environment:
      - RUST_LOG=info
  codevyr:
    image: codevyr:prod
    build: ../askl-react
    environment:
      - API_HOST=http://askld:8080
    ports:
      - "3000:3000"
