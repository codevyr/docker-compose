services:
  askld:
    image: ghcr.io/codevyr/askld:v0.2.1
    command: ["serve", "--database-url", "postgres://postgres:postgres@db:5432/askl", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      - RUST_LOG=info
      - ASKL_BOOTSTRAP_MODE=true
    ports:
      - "3002:8080"
    depends_on:
      - db
    networks:
      - app
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=askl
    volumes:
      - askl-db:/var/lib/postgresql/data
    networks:
      - db
  codevyr:
    image: ghcr.io/codevyr/codevyr:v0.2.0
    environment:
      - API_HOST=http://askld:8080
      - NEXT_PUBLIC_ASKLD_URL=${NEXT_PUBLIC_ASKLD_URL:-https://api.codevyr.com}
    ports:
      - "3000:3000"
    networks:
      - app

volumes:
  askl-db:

networks:
  app: {}
  db:
    internal: true
